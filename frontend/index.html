<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <title>Me Money</title>
</head>
<body style="width: 100vw; height: 100vh;">
    <div class="d-flex align-items-center justify-content-center" style="width: 100%; height: 100%;">
        <form id="form" class="row g-4 p-4">
                <div class="col-md-3">
                    <label for="type">Type</label>
                    <select class="form-select" aria-label="Type" id="type">
                        <option value="withdrawal">Withdrawal</option>
                        <option value="revenue">Revenue</option>
                        <option value="transfer">Transfer</option>
                    </select>
                </div>

                <div class="col-md-3">
                    <label for="source">Source</label>
                    <select class="form-select" aria-label="Type" id="source">
                        <option value="">-- None --</option>
                        <option value="1">American Express</option>
                        <option value="2">Charles Schwab</option>
                        <option value="3">Chase (Amazon)</option>
                        <option value="4">Discover savings</option>
                        <option value="5">Paypal</option>
                        <option value="6">Schwab Savings</option>
                    </select>
                </div>

                <div class="col-md-3">
                    <label for="destination">Destination</label>
                    <select class="form-select" aria-label="Type" id="destination">
                        <option value="">-- None --</option>
                        <option value="1">American Express</option>
                        <option value="2">Charles Schwab</option>
                        <option value="3">Chase (Amazon)</option>
                        <option value="4">Discover savings</option>
                        <option value="5">Paypal</option>
                        <option value="6">Schwab Savings</option>
                    </select>
                </div>

                <div class="col-md-3">
                    <label for="amount" class="form-label">Amount</label>
                    <input type="text" class="form-control" id="amount" placeholder="1750.00">
                </div>

                <div class="col-md-4">
                    <label for="date">Date</label>
                    <input type="date" class="form-control" id="date">
                </div>

                <div class="col-md-4">
                    <label for="category">Category</label>
                    <select class="form-select" aria-label="Type" id="category">
                    </select>
                </div>

                <div class="col-md-4">
                    <label for="subcategory">Subcategory</label>
                    <select class="form-select" aria-label="Type" id="subcategory">
                    </select>
                </div>

                <div class="col-md-12">
                    <label for="description" class="form-label">Description</label>
                    <input type="text" class="form-control" id="description" placeholder="Money for baby mama stuff">
                </div>
                
                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-primary">Submit</button>
                </div>
        </form>
    </div>

    <script src="./index.js" type="text/javascript"></script>
</body>
</html>
